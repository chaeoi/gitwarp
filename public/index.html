<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GitWarp</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #101418;
        color: #eef2f6;
      }
      main {
        width: min(760px, calc(100vw - 32px));
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 1.08;
      }
      p {
        color: #b8c2cc;
        line-height: 1.65;
      }
      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: #202830;
        color: #f5f7fa;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GitWarp</h1>
      <p>
        Add <code>gitwarp.pages.dev/</code> before the image name and pull as usual.
      </p>
      <p><code>gitwarp.pages.dev/alpine:latest</code></p>
      <p><code>gitwarp.pages.dev/ghcr.io/owner/image:tag</code></p>
    </main>
  </body>
</html>
